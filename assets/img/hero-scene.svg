<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1f3a"/>
      <stop offset="0.55" stop-color="#13386b"/>
      <stop offset="1" stop-color="#2c6e8f"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c5f7a"/>
      <stop offset="1" stop-color="#0e3a52"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbd56b"/>
      <stop offset="1" stop-color="#f4b223"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1230" cy="300" r="150" fill="url(#sun)" opacity="0.9"/>

  <!-- sea -->
  <rect y="560" width="1600" height="440" fill="url(#sea)"/>
  <path d="M0,560 Q200,520 400,560 T800,560 T1200,560 T1600,560 V620 H0 Z" fill="#2c6e8f" opacity="0.6"/>
  <path d="M0,600 Q200,560 400,600 T800,600 T1200,600 T1600,600 V660 H0 Z" fill="#3a7d9c" opacity="0.5"/>

  <!-- sand -->
  <path d="M0,760 Q400,700 800,750 T1600,740 V1000 H0 Z" fill="#e8c486"/>
  <path d="M0,800 Q400,760 800,800 T1600,790 V1000 H0 Z" fill="#dfb86f"/>

  <!-- palm tree left -->
  <g transform="translate(120,560)">
    <rect x="-8" y="0" width="16" height="170" fill="#5a3a22" rx="6"/>
    <g fill="#1f6b4a">
      <ellipse cx="0" cy="-10" rx="90" ry="26" transform="rotate(-25 0 -10)"/>
      <ellipse cx="0" cy="-10" rx="90" ry="26" transform="rotate(20 0 -10)"/>
      <ellipse cx="0" cy="-10" rx="90" ry="26" transform="rotate(65 0 -10)"/>
      <ellipse cx="0" cy="-10" rx="90" ry="26" transform="rotate(-70 0 -10)"/>
    </g>
  </g>

  <!-- food trailer -->
  <g transform="translate(620,640)">
    <rect x="0" y="40" width="420" height="160" rx="14" fill="#fff8ec"/>
    <rect x="0" y="40" width="420" height="46" fill="#c8102e"/>
    <rect x="0" y="180" width="420" height="20" fill="#0b1f3a"/>
    <text x="210" y="72" font-family="'Poppins',Arial,sans-serif" font-weight="800" font-size="26" fill="#fff" text-anchor="middle" letter-spacing="2">DETROIT DAWGS</text>
    <rect x="24" y="104" width="372" height="60" rx="8" fill="#0b1f3a"/>
    <rect x="40" y="116" width="100" height="36" rx="4" fill="#cfe8f2"/>
    <rect x="160" y="116" width="100" height="36" rx="4" fill="#cfe8f2"/>
    <rect x="280" y="116" width="100" height="36" rx="4" fill="#cfe8f2"/>
    <!-- wheels -->
    <circle cx="70" cy="205" r="20" fill="#1a1a1a"/>
    <circle cx="350" cy="205" r="20" fill="#1a1a1a"/>
    <!-- awning -->
    <path d="M0,86 L-40,150 L420,150 L420,86 Z" fill="#f4b223"/>
    <g fill="#c8102e">
      <rect x="-40" y="140" width="58" height="14"/>
      <rect x="76" y="140" width="58" height="14"/>
      <rect x="192" y="140" width="58" height="14"/>
      <rect x="308" y="140" width="58" height="14"/>
    </g>
  </g>

  <!-- gulls -->
  <g stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M180,180 q14,-16 28,0 q14,-16 28,0"/>
    <path d="M340,140 q10,-12 20,0 q10,-12 20,0"/>
    <path d="M1380,220 q12,-14 24,0 q12,-14 24,0"/>
  </g>
</svg>
